name: Deploy_github

on:
  release:
    types: [published]

jobs:
  deploy-github-packages:
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag matches Gradle version
        id: validate
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MODULE_VERSION=$(grep '^conekta.version=' gradle.properties | cut -d'=' -f2)
          echo "tag_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "module_version=$MODULE_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$MODULE_VERSION" ]; then
            echo "::warning::Tag $VERSION does not match conekta.version $MODULE_VERSION, skipping deploy-github-packages"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v5
        if: steps.validate.outputs.skip == 'false'
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        if: steps.validate.outputs.skip == 'false'
        uses: gradle/actions/setup-gradle@v5

      - uses: android-actions/setup-android@v3
        if: steps.validate.outputs.skip == 'false'

      - name: Publish to GitHub Packages
        if: steps.validate.outputs.skip == 'false'
        run: ./gradlew :shared:publishAllPublicationsToGitHubPackagesRepository :compose:publishAllPublicationsToGitHubPackagesRepository --no-configuration-cache
        env:
          GP_USER: ${{ github.actor }}
          GP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-webapp:
    runs-on: aws-runner-set
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag matches webapp version
        id: validate
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MODULE_VERSION=$(grep -m1 '"version"' webApp/package.json | sed 's/.*: *"\(.*\)".*/\1/')
          echo "tag_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "module_version=$MODULE_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$MODULE_VERSION" ]; then
            echo "::warning::Tag $VERSION does not match webApp version $MODULE_VERSION, skipping deploy-webapp"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          # Determine npm dist-tag
          if echo "$VERSION" | grep -q "alpha"; then
            echo "dist_tag=alpha" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -q "beta"; then
            echo "dist_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v5
        if: steps.validate.outputs.skip == 'false'
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        if: steps.validate.outputs.skip == 'false'
        uses: gradle/actions/setup-gradle@v5

      - uses: actions/setup-node@v6
        if: steps.validate.outputs.skip == 'false'
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: 'https://npm.pkg.github.com'

      - name: Install make
        if: steps.validate.outputs.skip == 'false'
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Build shared JS
        if: steps.validate.outputs.skip == 'false'
        run: make js-build-ci

      - name: Install dependencies
        if: steps.validate.outputs.skip == 'false'
        run: npm ci

      - name: Build webapp
        if: steps.validate.outputs.skip == 'false'
        run: npm run build

      - name: Publish to GitHub Packages NPM
        if: steps.validate.outputs.skip == 'false'
        working-directory: webApp
        run: npm publish --tag ${{ steps.validate.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-xcframework:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag matches Gradle version
        id: validate
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MODULE_VERSION=$(grep '^conekta.version=' gradle.properties | cut -d'=' -f2)
          echo "tag_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "module_version=$MODULE_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$MODULE_VERSION" ]; then
            echo "::warning::Tag $VERSION does not match conekta.version $MODULE_VERSION, skipping deploy-xcframework"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v5
        if: steps.validate.outputs.skip == 'false'
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        if: steps.validate.outputs.skip == 'false'
        uses: gradle/actions/setup-gradle@v5

      - name: Build XCFramework
        if: steps.validate.outputs.skip == 'false'
        run: ./gradlew :compose:assembleComposeKitReleaseXCFramework --no-configuration-cache

      - name: Package and compute checksum
        if: steps.validate.outputs.skip == 'false'
        id: package
        run: |
          cd compose/build/XCFrameworks/release
          zip -r composeKit.xcframework.zip composeKit.xcframework
          CHECKSUM=$(swift package compute-checksum composeKit.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "$CHECKSUM" > checksum.txt
          echo "XCFramework checksum: $CHECKSUM"

      - name: Upload to release assets
        if: steps.validate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            compose/build/XCFrameworks/release/composeKit.xcframework.zip \
            compose/build/XCFrameworks/release/checksum.txt \
            --clobber

      - name: Update latest release
        if: steps.validate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing latest release and tag if they exist
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # Create new latest release pointing to current commit
          gh release create latest \
            compose/build/XCFrameworks/release/composeKit.xcframework.zip \
            compose/build/XCFrameworks/release/checksum.txt \
            --title "Latest (${{ steps.validate.outputs.tag_version }})" \
            --notes "Latest stable XCFramework release (v${{ steps.validate.outputs.tag_version }}).

          Checksum: \`${{ steps.package.outputs.checksum }}\`

          > This release is automatically updated on every new version.
          > For a specific version, use the corresponding versioned release." \
            --prerelease=false

      - name: Update checksum in README
        if: steps.validate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          VERSION="${{ steps.validate.outputs.tag_version }}"
          sed -i '' "s/checksum: \".*\"/checksum: \"$CHECKSUM\"/" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && exit 0
          BRANCH="chore/xcframework-checksum-${VERSION}"
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "chore: update XCFramework checksum to $CHECKSUM"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update XCFramework checksum for v${VERSION}" \
            --body "Automated checksum update after XCFramework release v${VERSION}."
