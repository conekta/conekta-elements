name: Ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'

jobs:
  build_kmp:
    runs-on: aws-runner-set
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - uses: android-actions/setup-android@v3
      
      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make
      
      - name: Build KMP
        run: make build

      - name: Publish dry run
        run: make publish-local

  build_js:
    runs-on: aws-runner-set
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      
      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make
      
      - name: Prepare (JS Build)
        run: make js-build
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Publish dry run
        run: npm run publish-dry-run
