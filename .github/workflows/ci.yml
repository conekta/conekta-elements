name: Ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  build_kmp:
    runs-on: aws-runner-set
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - uses: android-actions/setup-android@v3

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Build KMP
        run: make build-ci

      - name: shared test
        run: make shared-test

      - name: linter check
        run: make lint-check

      - name: Validate strings order
        run: ./gradlew :compose:validateStringsOrder

      - name: Validate strings spelling
        run: ./gradlew :compose:validateStringsSpelling

      - name: Publish dry run
        run: make publish-local

  build_js:
    runs-on: aws-runner-set
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Prepare (JS Build)
        run: make js-build-ci

      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        working-directory: webApp
        run: npm run test:ci
      - name: Lint
        working-directory: webApp
        run: npm run lint
      - name: Build
        run: npm run build

      - name: Publish dry run
        run: npm run publish-dry-run
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: webApp
          exitZeroOnChanges: true
          exitOnceUploaded: true
          skip: "@(renovate/**|dependabot/**)"
