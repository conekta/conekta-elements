name: Ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  build_kmp:
    runs-on: aws-runner-set
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - uses: android-actions/setup-android@v3

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Build KMP
        run: make build-ci

      - name: shared test
        run: make shared-test

      - name: compose test
        run: make compose-test

      - name: Upload KMP coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kmp-coverage
          path: |
            shared/build/reports/kover/**/*.xml
            compose/build/reports/kover/**/*.xml
          if-no-files-found: error

      - name: linter check
        run: make lint-check

      - name: Validate strings order
        run: ./gradlew :compose:validateStringsOrder

      - name: Validate strings spelling
        run: ./gradlew :compose:validateStringsSpelling

      - name: Publish dry run
        run: make publish-local

  build_js:
    runs-on: aws-runner-set
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: '.sdkmanrc'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Prepare (JS Build)
        run: make js-build-ci

      - name: Install dependencies
        run: npm ci
      
      - name: Run tests with coverage
        working-directory: webApp
        run: npm run test:coverage

      - name: Upload JS coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: js-coverage
          path: webApp/coverage/lcov.info
          if-no-files-found: error

      - name: Lint
        working-directory: webApp
        run: npm run lint
      - name: Build
        run: npm run build

      - name: Publish dry run
        run: npm run publish-dry-run
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: webApp
          exitZeroOnChanges: true
          exitOnceUploaded: true
          skip: "@(renovate/**|dependabot/**)"

  sonarcloud:
    runs-on: aws-runner-set
    needs: [build_kmp, build_js]
    if: always() && (needs.build_kmp.result == 'success' && needs.build_js.result == 'success')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Download JS coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: js-coverage
          path: webApp/coverage

      - name: Download KMP coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: kmp-coverage
          path: .

      - name: Debug downloaded coverage files
        run: |
          ls -la
          echo "JS coverage:"
          find webApp/coverage -type f | sort || true
          echo "KMP coverage:"
          find shared/build/reports -type f | grep -i kover | sort || true
          find compose/build/reports -type f | grep -i kover | sort || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.log.level=DEBUG
            -Dsonar.projectVersion=${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_VERSION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
